name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - build.zig.zon
      - build.zig
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g. 1.2.3, without leading v)
        required: true
        type: string

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version and release decision
        id: version
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch requested for v${VERSION}"
            exit 0
          fi

          CURRENT_VERSION="$(grep -E '\.version' build.zig.zon | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          PREV_VERSION=""
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV_VERSION="$(git show HEAD^:build.zig.zon 2>/dev/null | grep -E '\.version' | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || true)"
          fi

          echo "Current version: ${CURRENT_VERSION}"
          echo "Previous version: ${PREV_VERSION}"

          if [ "${CURRENT_VERSION}" = "${PREV_VERSION}" ]; then
            echo "Version unchanged since previous commit; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git ls-remote --tags origin "refs/tags/v${CURRENT_VERSION}" | grep -q "refs/tags/v${CURRENT_VERSION}"; then
            echo "Tag v${CURRENT_VERSION} already exists on origin; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

  generate-notes:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.notes.outputs.notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate AI release notes
        id: notes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail

          PREV_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE=""
          fi

          if [ -n "${RANGE}" ]; then
            DIFF="$(git diff "${PREV_TAG}" HEAD -- '*.zig' 'build.zig.zon' 'build.zig' 'README.md' | head -c 60000 || true)"
            LOG="$(git log "${RANGE}" --pretty=format:'- %s' || true)"
          else
            DIFF="$(git diff HEAD -- '*.zig' 'build.zig.zon' 'build.zig' 'README.md' | head -c 60000 || true)"
            LOG="$(git log --pretty=format:'- %s' | head -50 || true)"
          fi

          FALLBACK_NOTES="Release v${VERSION}

          ## Changes

          ${LOG}"

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "No OPENAI_API_KEY set; using fallback notes."
            {
              echo "notes<<GR_NOTES_EOF"
              echo "${FALLBACK_NOTES}"
              echo "GR_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SYSTEM_PROMPT="You are writing release notes for gr (guardrail), a fast independent version control system written in Zig, with full git interop. Write concise, professional release notes. Do not use emojis. Do not include a title or version header. Use markdown with ## sections chosen from: Features, Fixes, Improvements, Breaking Changes. Only include sections that apply. Be concise and factual."

          USER_CONTENT="Commit log:
          ${LOG}

          Diff:
          ${DIFF}"

          PAYLOAD="$(jq -n \
            --arg system "${SYSTEM_PROMPT}" \
            --arg user "${USER_CONTENT}" \
            '{
              model: "gpt-5.2",
              messages: [
                { role: "system", content: $system },
                { role: "user", content: $user }
              ]
            }')"

          RESPONSE="$(curl -sS --fail-with-body https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" 2>/dev/null || true)"

          NOTES="$(printf '%s' "${RESPONSE}" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)"

          if [ -z "${NOTES}" ]; then
            echo "OpenAI request failed or returned empty; using fallback notes."
            NOTES="${FALLBACK_NOTES}"
          fi

          {
            echo "notes<<GR_NOTES_EOF"
            echo "${NOTES}"
            echo "GR_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  create-tag:
    needs: [check-version, generate-notes]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists locally; skipping tag creation."
            exit 0
          fi
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

  create-release:
    needs: [check-version, generate-notes, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: ${{ needs.generate-notes.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [check-version, create-release]
    if: always() && (needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            asset: gr-macos-arm64
            os: macos
          - runner: macos-13
            asset: gr-macos-x64
            os: macos
          - runner: ubuntu-latest
            asset: gr-linux-x64
            os: linux
          - runner: ubuntu-24.04-arm
            asset: gr-linux-arm64
            os: linux
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If 0.16.0 is not yet available in setup-zig's version index, pin to the
      # exact release tag or mirror URL the project uses instead of "0.16.0".
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Install libgit2 (macOS)
        if: matrix.os == 'macos'
        run: brew install libgit2 pkg-config

      - name: Install libgit2 (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgit2-dev pkg-config

      - name: Build
        run: zig build -Doptimize=ReleaseFast

      - name: Package binary
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail
          cp zig-out/bin/gr "${ASSET}"
          chmod +x "${ASSET}"
          shasum -a 256 "${ASSET}" | awk '{print $1}' > "${ASSET}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version || github.event.inputs.version }}
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
